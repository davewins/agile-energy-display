substitutions:
  device_name: agile-energy-display
  friendly_name: Agile Energy Display
  api_key: "REPLACE_WITH_YOUR_API_KEY"
  ota_password: "REPLACE_WITH_YOUR_OTA_PASSWORD"
  ap_password: "REPLACE_WITH_YOUR_AP_PASSWORD"
  # Your Octopus Energy meter identifiers
  # Find these by looking at your entity IDs in HA:
  # e.g. sensor.octopus_energy_electricity_SERIAL_MPAN_current_rate
  octopus_serial: "YOUR_METER_SERIAL"       # e.g. 23e5102151
  octopus_mpan: "YOUR_MPAN"                 # e.g. 1412483603003
  # Current demand/power sensor entity ID.
  # The Octopus Home Mini provides:
  #   sensor.octopus_energy_electricity_SERIAL_MPAN_current_demand  (value in Watts)
  # If you don't have a Home Mini, substitute any power sensor here.
  # Note: the display assumes the value is in Watts. If your sensor
  # reports in kW, adjust the formatting lambda in the ESPHome config.
  current_demand_entity: "sensor.octopus_energy_electricity_${octopus_serial}_${octopus_mpan}_current_demand"
  # Today's cumulative energy consumption sensor (value in kWh).
  accumulative_consumption_entity: "sensor.octopus_energy_electricity_${octopus_serial}_${octopus_mpan}_current_accumulative_consumption"
  # Today's cumulative cost sensor (value in £).
  accumulative_cost_entity: "sensor.octopus_energy_electricity_${octopus_serial}_${octopus_mpan}_current_accumulative_cost"

esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"
  on_boot:
    priority: -10
    then:
      - delay: 8s
      - script.execute: schedule_chart_redraw
      - script.execute: schedule_tomorrow_chart_redraw
      - script.execute: restore_auto_brightness

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "${api_key}"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "${friendly_name}"
    password: "${ap_password}"

captive_portal:

ota:
  - platform: esphome
    password: "${ota_password}"
    on_begin:
      - light.turn_off:
          id: display_backlight
          transition_length: 0s
      - lambda: "id(display_backlight).loop();"

web_server:
  port: 80

switch:
  - platform: gpio
    name: Relay 1
    pin:
      number: GPIO40
      inverted: true
  - platform: gpio
    name: Relay 2
    pin:
      number: GPIO2
      inverted: true
  - platform: gpio
    name: Relay 3
    pin:
      number: GPIO1
      inverted: true

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: Backlight
    id: display_backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 1s

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl:
    number: 45
    ignore_strapping_warning: true

display:
  - platform: st7701s
    id: tft_display
    dimensions:
      width: 480
      height: 480
    spi_mode: MODE3
    data_rate: 2MHz
    color_order: RGB
    invert_colors: false
    cs_pin: 39
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    pclk_frequency: 12MHz
    pclk_inverted: false
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 20
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 10
    update_interval: never
    auto_clear_enabled: false
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xCD, 0x00]
    data_pins:
      red: [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue: [4, 5, 6, 7, 15]

touchscreen:
  - platform: gt911
    id: tft_touch
    display: tft_display
    on_touch:
      then:
        - script.execute: apply_normal_brightness
        - script.execute: schedule_redim
        - if:
            condition:
              lambda: 'return id(tomorrow_page_active);'
            then:
              - script.stop: schedule_return_to_main
              - lambda: |-
                  id(tomorrow_page_active) = false;
                  id(last_returned_from_tomorrow) = millis();
              - lvgl.page.show: page_main
            else:
              - if:
                  condition:
                    lambda: 'return (millis() - id(last_returned_from_tomorrow)) > 500;'
                  then:
                    - lambda: 'id(tomorrow_page_active) = true;'
                    - lvgl.page.show: page_tomorrow
                    - script.execute: schedule_return_to_main

psram:
  mode: octal
  speed: 80MHz

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_clock
              text:
                format: "%02d:%02d"
                args:
                  - "id(ha_time).now().hour"
                  - "id(ha_time).now().minute"

font:
  - file: "gfonts://Roboto"
    id: font_xxs
    size: 13
  - file: "gfonts://Roboto"
    id: font_xs
    size: 16
  - file: "gfonts://Roboto"
    id: font_sm
    size: 20
  - file: "gfonts://Roboto"
    id: font_md
    size: 26
  - file: "gfonts://Roboto"
    id: font_lg
    size: 34
  - file: "gfonts://Roboto"
    id: font_xl2
    size: 44
  - file: "gfonts://Roboto"
    id: font_xl
    size: 54

globals:
  - id: chart_now_index
    type: int
    restore_value: no
    initial_value: "0"
  - id: current_rate_value
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: next_rate_value
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: normal_brightness
    type: float
    initial_value: "1.0"
  - id: dim_brightness
    type: float
    initial_value: "0.35"
  - id: wake_timeout
    type: int
    initial_value: "20"
  - id: tomorrow_page_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: last_returned_from_tomorrow
    type: uint32_t
    restore_value: no
    initial_value: "0"

sensor:
  - platform: homeassistant
    id: sensor_current_rate
    entity_id: sensor.octopus_energy_electricity_${octopus_serial}_${octopus_mpan}_current_rate
    internal: true
    on_value:
      then:
        - lambda: |-
            id(current_rate_value) = x * 100.0f;
        - lvgl.label.update:
            id: lbl_now_rate
            text:
              format: "%.2fp"
              args: ["x * 100.0f"]

  - platform: homeassistant
    id: sensor_next_rate
    entity_id: sensor.octopus_energy_electricity_${octopus_serial}_${octopus_mpan}_next_rate
    internal: true
    on_value:
      then:
        - lambda: |-
            id(next_rate_value) = x * 100.0f;
        - lvgl.label.update:
            id: lbl_next_rate
            text:
              format: "Next %.2fp"
              args: ["x * 100.0f"]

  - platform: homeassistant
    id: sensor_house_load_kw
    entity_id: "${current_demand_entity}"
    internal: true
    on_value:
      then:
        - lambda: |-
            char buf[24];
            if (x < 1000.0f) {
              snprintf(buf, sizeof(buf), "%.0f W", x);
            } else if (x < 10000.0f) {
              snprintf(buf, sizeof(buf), "%.2f kW", x / 1000.0f);
            } else {
              snprintf(buf, sizeof(buf), "%.1f kW", x / 1000.0f);
            }
            lv_label_set_text(id(lbl_house_load), buf);

  - platform: homeassistant
    id: sensor_today_kwh
    entity_id: "${accumulative_consumption_entity}"
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_today_kwh
            text:
              format: "%.1f kWh"
              args: ["x"]

  - platform: homeassistant
    id: sensor_today_cost
    entity_id: "${accumulative_cost_entity}"
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_today_cost
            text:
              format: "£%.2f"
              args: ["x"]

  - platform: homeassistant
    id: sensor_today_avg_rate
    entity_id: sensor.agile_today_average_rate
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_today_avg
            text:
              format: "%.1fp"
              args: ["x"]

text_sensor:
  - platform: homeassistant
    id: sun_state
    entity_id: sun.sun
    internal: true

  - platform: homeassistant
    id: sensor_slot_text
    entity_id: sensor.agile_current_slot_text
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_slot
            text: !lambda "return x;"

  - platform: homeassistant
    id: sensor_today_high_plot_text
    entity_id: sensor.agile_today_high_text
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_today_high_plot
            text: !lambda "return x;"

  - platform: homeassistant
    id: sensor_today_prices_csv
    entity_id: sensor.agile_display_payload
    attribute: today_prices_csv
    internal: true
    on_value:
      then:
        - script.execute: schedule_chart_redraw

  - platform: homeassistant
    id: sensor_current_slot_index_text
    entity_id: sensor.agile_display_payload
    attribute: current_slot_index
    internal: true
    on_value:
      then:
        - script.execute: schedule_chart_redraw

  - platform: homeassistant
    id: sensor_best_remaining_text
    entity_id: sensor.agile_display_payload
    attribute: best_remaining_text
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_best_remaining
            text: !lambda "return x;"

  - platform: homeassistant
    id: sensor_tomorrow_prices_csv
    entity_id: sensor.agile_display_payload
    attribute: tomorrow_prices_csv
    internal: true
    on_value:
      then:
        - script.execute: schedule_tomorrow_chart_redraw

  - platform: homeassistant
    id: sensor_tomorrow_ready
    entity_id: sensor.agile_display_payload
    attribute: tomorrow_ready
    internal: true

  - platform: homeassistant
    id: sensor_tomorrow_low_value
    entity_id: sensor.agile_tomorrow_lowest
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tomorrow_low_value
            text:
              format: "%.2fp"
              args: ["atof(x.c_str())"]

  - platform: homeassistant
    id: sensor_tomorrow_high_value
    entity_id: sensor.agile_tomorrow_highest
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tomorrow_high_value
            text:
              format: "%.2fp"
              args: ["atof(x.c_str())"]

  - platform: homeassistant
    id: sensor_tomorrow_avg_value
    entity_id: sensor.agile_tomorrow_average
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tomorrow_avg_value
            text:
              format: "%.2fp"
              args: ["atof(x.c_str())"]

  - platform: homeassistant
    id: sensor_tomorrow_best_2h_text
    entity_id: sensor.agile_tomorrow_best_2h_text
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tomorrow_best_2h_value
            text: !lambda "return x;"

  - platform: homeassistant
    id: sensor_tomorrow_peak_window_text
    entity_id: sensor.agile_tomorrow_peak_window_text
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tomorrow_peak_window_value
            text: !lambda "return x;"

binary_sensor:
  - platform: status
    name: "${friendly_name} Status"

  - platform: homeassistant
    id: bs_night_mode
    entity_id: binary_sensor.agile_display_night_mode
    internal: true
    on_state:
      then:
        - script.execute: restore_auto_brightness

script:
  - id: schedule_return_to_main
    mode: restart
    then:
      - delay: 45s
      - lambda: 'id(tomorrow_page_active) = false;'
      - lvgl.page.show: page_main

  - id: apply_normal_brightness
    then:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda 'return id(normal_brightness);'

  - id: apply_dim_brightness
    then:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda 'return id(dim_brightness);'

  - id: restore_auto_brightness
    then:
      - if:
          condition:
            binary_sensor.is_on: bs_night_mode
          then:
            - script.execute: apply_dim_brightness
          else:
            - script.execute: apply_normal_brightness

  - id: schedule_redim
    mode: restart
    then:
      - delay: !lambda "return id(wake_timeout) * 1000;"
      - script.execute: restore_auto_brightness

  - id: update_now_card_colour_from_band
    then:
      - lambda: |-
          const std::string csv = id(sensor_today_prices_csv).state;
          int idx = atoi(id(sensor_current_slot_index_text).state.c_str());

          if (csv.empty()) return;
          if (idx < 0) idx = 0;
          if (idx > 47) idx = 47;

          float value = 0.0f;
          int current = 0;
          size_t start = 0;

          for (size_t p = 0; p <= csv.size(); p++) {
            if (p == csv.size() || csv[p] == ',') {
              if (current == idx) {
                value = atof(csv.substr(start, p - start).c_str());
                break;
              }
              current++;
              start = p + 1;
            }
          }

          uint32_t bg = 0x1B5E20;
          uint32_t border = 0x66BB6A;

          if (value < 0.0f) {
            bg = 0x1565C0;
            border = 0x42A5F5;
          } else if (value < 12.0f) {
            bg = 0x558B2F;
            border = 0x9CCC65;
          } else if (value < 25.0f) {
            bg = 0x1B5E20;
            border = 0x66BB6A;
          } else if (value < 35.0f) {
            bg = 0xE65100;
            border = 0xFFB74D;
          } else {
            bg = 0xC62828;
            border = 0xEF5350;
          }

          lv_obj_set_style_bg_color(id(card_now), lv_color_hex(bg), LV_PART_MAIN);
          lv_obj_set_style_border_color(id(card_now), lv_color_hex(border), LV_PART_MAIN);

  - id: update_advice_text
    then:
      - lambda: |-
          const std::string csv = id(sensor_today_prices_csv).state;
          int idx = atoi(id(sensor_current_slot_index_text).state.c_str());

          if (csv.empty()) {
            lv_label_set_text(id(lbl_advice), "Loading tariff...");
            return;
          }

          if (idx < 0) idx = 0;
          if (idx > 47) idx = 47;

          float values[48];
          for (int i = 0; i < 48; i++) values[i] = 0.0f;

          int current = 0;
          size_t start = 0;
          for (size_t p = 0; p <= csv.size(); p++) {
            if (p == csv.size() || csv[p] == ',') {
              if (current < 48) {
                values[current] = atof(csv.substr(start, p - start).c_str());
              }
              current++;
              start = p + 1;
            }
          }

          const float value = values[idx];
          const float next_value = (idx < 47) ? values[idx + 1] : values[idx];

          float best_future = values[idx];
          for (int i = idx; i < 48; i++) {
            if (values[i] < best_future) best_future = values[i];
          }

          const float delta_best = value - best_future;
          const float delta_next = value - next_value;

          if (value < 0.0f) {
            lv_label_set_text(id(lbl_advice), "Negative rate - ideal time to use power");
          } else if (delta_best <= 0.1f) {
            if (value < 12.0f) {
              lv_label_set_text(id(lbl_advice), "Best remaining rate - very cheap now");
            } else if (value < 25.0f) {
              lv_label_set_text(id(lbl_advice), "Best remaining rate - below price cap");
            } else if (value < 35.0f) {
              lv_label_set_text(id(lbl_advice), "Best remaining rate - above price cap");
            } else {
              lv_label_set_text(id(lbl_advice), "Peak pricing - avoid heavy loads");
            }
          } else if (value < 12.0f) {
            if (delta_best >= 2.0f) {
              lv_label_set_text(id(lbl_advice), "Very cheap now - even cheaper later");
            } else {
              lv_label_set_text(id(lbl_advice), "Very cheap - great time to use power");
            }
          } else if (value < 25.0f) {
            if (delta_best >= 3.0f) {
              lv_label_set_text(id(lbl_advice), "Below price cap - cheaper later today");
            } else {
              lv_label_set_text(id(lbl_advice), "Below price cap - fine to use power");
            }
          } else if (value < 35.0f) {
            if (delta_next >= 3.0f) {
              lv_label_set_text(id(lbl_advice), "Above price cap - cheaper next slot");
            } else if (delta_best >= 5.0f) {
              lv_label_set_text(id(lbl_advice), "Above price cap - wait if possible");
            } else {
              lv_label_set_text(id(lbl_advice), "Above price cap - use with care");
            }
          } else {
            if (delta_next >= 3.0f) {
              lv_label_set_text(id(lbl_advice), "Peak pricing now - cheaper next slot");
            } else if (delta_best >= 5.0f) {
              lv_label_set_text(id(lbl_advice), "Peak pricing - wait if you can");
            } else {
              lv_label_set_text(id(lbl_advice), "Peak pricing - avoid heavy loads");
            }
          }

  - id: schedule_chart_redraw
    mode: restart
    then:
      - delay: 400ms
      - script.execute: update_now_card_colour_from_band
      - script.execute: update_advice_text
      - script.execute: update_price_bars

  - id: update_price_bars
    mode: restart
    then:
      - lambda: |-
          lv_obj_invalidate(id(price_plot));
          lv_obj_t *bars[48] = {
            id(bar_00), id(bar_01), id(bar_02), id(bar_03), id(bar_04), id(bar_05),
            id(bar_06), id(bar_07), id(bar_08), id(bar_09), id(bar_10), id(bar_11),
            id(bar_12), id(bar_13), id(bar_14), id(bar_15), id(bar_16), id(bar_17),
            id(bar_18), id(bar_19), id(bar_20), id(bar_21), id(bar_22), id(bar_23),
            id(bar_24), id(bar_25), id(bar_26), id(bar_27), id(bar_28), id(bar_29),
            id(bar_30), id(bar_31), id(bar_32), id(bar_33), id(bar_34), id(bar_35),
            id(bar_36), id(bar_37), id(bar_38), id(bar_39), id(bar_40), id(bar_41),
            id(bar_42), id(bar_43), id(bar_44), id(bar_45), id(bar_46), id(bar_47)
          };

          const std::string csv = id(sensor_today_prices_csv).state;
          if (csv.empty()) {
            ESP_LOGW("agile_chart", "today_prices_csv is empty");
            return;
          }

          int now_idx = 0;
          if (!id(sensor_current_slot_index_text).state.empty()) {
            now_idx = atoi(id(sensor_current_slot_index_text).state.c_str());
          }
          if (now_idx < 0) now_idx = 0;
          if (now_idx > 47) now_idx = 47;
          id(chart_now_index) = now_idx;

          float values[48];
          for (int i = 0; i < 48; i++) values[i] = 0.0f;

          int current = 0;
          size_t start = 0;
          for (size_t p = 0; p <= csv.size(); p++) {
            if (p == csv.size() || csv[p] == ',') {
              if (current < 48) {
                values[current] = atof(csv.substr(start, p - start).c_str());
              }
              current++;
              start = p + 1;
            }
          }

          for (int idx = 0; idx < 48; idx++) {
            float value = values[idx];
            float visual = value;

            if (visual < 0.0f) visual = 0.0f;
            if (visual > 45.0f) visual = 45.0f;

            int bar_h = (value < 0.0f) ? 6 : (4 + (int) roundf((visual / 45.0f) * 58.0f));
            int x = 6 + (idx * 9);
            int y = 66 - bar_h;

            uint32_t color = 0x555555;
            uint32_t border_color = 0x555555;
            int border_width = 0;

            if (idx < now_idx) {
              color = 0x2F2F2F;
            } else if (value < 0.0f) {
              color = 0x1565C0;
            } else if (value < 12.0f) {
              color = 0x558B2F;
            } else if (value < 25.0f) {
              color = 0x1B5E20;
            } else if (value < 35.0f) {
              color = 0xE65100;
            } else {
              color = 0xC62828;
            }

            if (idx == now_idx) {
              border_width = 1;
              border_color = 0xFFFFFF;
            }

            lv_obj_set_pos(bars[idx], x, y);
            lv_obj_set_size(bars[idx], 8, bar_h);
            lv_obj_set_style_radius(bars[idx], 1, LV_PART_MAIN);
            lv_obj_set_style_bg_color(bars[idx], lv_color_hex(color), LV_PART_MAIN);
            lv_obj_set_style_bg_opa(bars[idx], LV_OPA_COVER, LV_PART_MAIN);
            lv_obj_set_style_border_width(bars[idx], border_width, LV_PART_MAIN);
            lv_obj_set_style_border_color(bars[idx], lv_color_hex(border_color), LV_PART_MAIN);
            lv_obj_set_style_border_opa(bars[idx], LV_OPA_COVER, LV_PART_MAIN);
          }

          lv_obj_t *marker = id(now_marker);
          int marker_x = 10 + (now_idx * 9) + 3;
          lv_obj_set_pos(marker, marker_x, 36);
          lv_obj_set_size(marker, 2, 86);
          lv_obj_set_style_bg_color(marker, lv_color_hex(0xFFFFFF), LV_PART_MAIN);
          lv_obj_set_style_bg_opa(marker, LV_OPA_COVER, LV_PART_MAIN);
          lv_obj_set_style_border_width(marker, 0, LV_PART_MAIN);

  - id: schedule_tomorrow_chart_redraw
    mode: restart
    then:
      - delay: 400ms
      - script.execute: update_tomorrow_price_bars

  - id: update_tomorrow_price_bars
    mode: restart
    then:
      - lambda: |-
          lv_obj_t *bars[48] = {
            id(tbar_00), id(tbar_01), id(tbar_02), id(tbar_03), id(tbar_04), id(tbar_05),
            id(tbar_06), id(tbar_07), id(tbar_08), id(tbar_09), id(tbar_10), id(tbar_11),
            id(tbar_12), id(tbar_13), id(tbar_14), id(tbar_15), id(tbar_16), id(tbar_17),
            id(tbar_18), id(tbar_19), id(tbar_20), id(tbar_21), id(tbar_22), id(tbar_23),
            id(tbar_24), id(tbar_25), id(tbar_26), id(tbar_27), id(tbar_28), id(tbar_29),
            id(tbar_30), id(tbar_31), id(tbar_32), id(tbar_33), id(tbar_34), id(tbar_35),
            id(tbar_36), id(tbar_37), id(tbar_38), id(tbar_39), id(tbar_40), id(tbar_41),
            id(tbar_42), id(tbar_43), id(tbar_44), id(tbar_45), id(tbar_46), id(tbar_47)
          };

          const std::string csv = id(sensor_tomorrow_prices_csv).state;

          if (csv.empty() || csv == "none") {
            lv_label_set_text(id(lbl_tomorrow_status), "Rates not published yet");

            for (int idx = 0; idx < 48; idx++) {
              int x = 6 + (idx * 9);
              lv_obj_set_pos(bars[idx], x, 112);
              lv_obj_set_size(bars[idx], 8, 6);
              lv_obj_set_style_radius(bars[idx], 1, LV_PART_MAIN);
              lv_obj_set_style_bg_color(bars[idx], lv_color_hex(0x2F2F2F), LV_PART_MAIN);
              lv_obj_set_style_bg_opa(bars[idx], LV_OPA_COVER, LV_PART_MAIN);
              lv_obj_set_style_border_width(bars[idx], 0, LV_PART_MAIN);
            }
            return;
          }

          lv_label_set_text(id(lbl_tomorrow_status), "Tomorrow");

          float values[48];
          for (int i = 0; i < 48; i++) values[i] = 0.0f;

          int current = 0;
          size_t start = 0;
          for (size_t p = 0; p <= csv.size(); p++) {
            if (p == csv.size() || csv[p] == ',') {
              if (current < 48) {
                values[current] = atof(csv.substr(start, p - start).c_str());
              }
              current++;
              start = p + 1;
            }
          }

          float min_price = 999.0f;
          int min_idx = 0;

          for (int i = 0; i < 48; i++) {
            if (values[i] < min_price) {
              min_price = values[i];
              min_idx = i;
            }
          }

          for (int idx = 0; idx < 48; idx++) {
            float value = values[idx];
            float visual = value;

            if (visual < 0.0f) visual = 0.0f;
            if (visual > 45.0f) visual = 45.0f;

            int bar_h = (value < 0.0f) ? 6 : (6 + (int) roundf((visual / 45.0f) * 108.0f));
            int x = 6 + (idx * 9);
            int y = 118 - bar_h;

            uint32_t color = 0x2F2F2F;
            uint32_t border_color = 0x000000;
            int border_width = 0;

            if (idx == min_idx) {
              border_width = 2;
              border_color = 0xFFFFFF;
            }

            if (value < 0.0f) {
              color = 0x1565C0;
            } else if (value < 12.0f) {
              color = 0x558B2F;
            } else if (value < 25.0f) {
              color = 0x1B5E20;
            } else if (value < 35.0f) {
              color = 0xE65100;
            } else {
              color = 0xC62828;
            }

            lv_obj_set_pos(bars[idx], x, y);
            lv_obj_set_size(bars[idx], 8, bar_h);
            lv_obj_set_style_radius(bars[idx], 1, LV_PART_MAIN);
            lv_obj_set_style_bg_color(bars[idx], lv_color_hex(color), LV_PART_MAIN);
            lv_obj_set_style_bg_opa(bars[idx], LV_OPA_COVER, LV_PART_MAIN);
            lv_obj_set_style_border_width(bars[idx], border_width, LV_PART_MAIN);
            lv_obj_set_style_border_color(bars[idx], lv_color_hex(border_color), LV_PART_MAIN);
            lv_obj_set_style_border_opa(bars[idx], LV_OPA_COVER, LV_PART_MAIN);
          }

