substitutions:
  device_name: agile-energy-display
  friendly_name: Agile Energy Display
  api_key: "REPLACE_WITH_YOUR_API_KEY"
  ota_password: "REPLACE_WITH_YOUR_OTA_PASSWORD"
  ap_password: "REPLACE_WITH_YOUR_AP_PASSWORD"
  # Your Octopus Energy meter identifiers
  # Find these by looking at your entity IDs in HA:
  # e.g. sensor.octopus_energy_electricity_SERIAL_MPAN_current_rate
  octopus_serial: "YOUR_METER_SERIAL"       # e.g. 23e5102151
  octopus_mpan: "YOUR_MPAN"                 # e.g. 1412483603003

esphome:
  name: "${device_name}"
  friendly_name: "${friendly_name}"
  on_boot:
    priority: -10
    then:
      - delay: 8s
      - script.execute: schedule_chart_redraw
      - script.execute: schedule_tomorrow_chart_redraw
      - script.execute: restore_auto_brightness

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "${api_key}"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "${friendly_name}"
    password: "${ap_password}"

captive_portal:

ota:
  - platform: esphome
    password: "${ota_password}"
    on_begin:
      - light.turn_off:
          id: display_backlight
          transition_length: 0s
      - lambda: "id(display_backlight).loop();"

web_server:
  port: 80

switch:
  - platform: gpio
    name: Relay 1
    pin:
      number: GPIO40
      inverted: true
  - platform: gpio
    name: Relay 2
    pin:
      number: GPIO2
      inverted: true
  - platform: gpio
    name: Relay 3
    pin:
      number: GPIO1
      inverted: true

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    name: Backlight
    id: display_backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 1s

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl:
    number: 45
    ignore_strapping_warning: true

display:
  - platform: st7701s
    id: tft_display
    dimensions:
      width: 480
      height: 480
    spi_mode: MODE3
    data_rate: 2MHz
    color_order: RGB
    invert_colors: false
    cs_pin: 39
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    pclk_frequency: 12MHz
    pclk_inverted: false
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 20
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 10
    update_interval: never
    auto_clear_enabled: false
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xCD, 0x00]
    data_pins:
      red: [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue: [4, 5, 6, 7, 15]

touchscreen:
  - platform: gt911
    id: tft_touch
    display: tft_display
    on_touch:
      then:
        - script.execute: apply_normal_brightness
        - script.execute: schedule_redim
        - if:
            condition:
              lambda: 'return id(tomorrow_page_active);'
            then:
              - script.stop: schedule_return_to_main
              - lambda: 'id(tomorrow_page_active) = false;'
              - lvgl.page.show: page_main

psram:
  mode: octal
  speed: 80MHz

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - seconds: 0
        then:
          - lvgl.label.update:
              id: lbl_clock
              text:
                format: "%02d:%02d"
                args:
                  - "id(ha_time).now().hour"
                  - "id(ha_time).now().minute"

font:
  - file: "gfonts://Roboto"
    id: font_xxs
    size: 13
  - file: "gfonts://Roboto"
    id: font_xs
    size: 16
  - file: "gfonts://Roboto"
    id: font_sm
    size: 20
  - file: "gfonts://Roboto"
    id: font_md
    size: 26
  - file: "gfonts://Roboto"
    id: font_lg
    size: 34
  - file: "gfonts://Roboto"
    id: font_xl2
    size: 44
  - file: "gfonts://Roboto"
    id: font_xl
    size: 54

globals:
  - id: chart_now_index
    type: int
    restore_value: no
    initial_value: "0"
  - id: current_rate_value
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: next_rate_value
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: normal_brightness
    type: float
    initial_value: "1.0"
  - id: dim_brightness
    type: float
    initial_value: "0.35"
  - id: wake_timeout
    type: int
    initial_value: "20"
  - id: tomorrow_page_active
    type: bool
    restore_value: no
    initial_value: "false"

sensor:
  - platform: homeassistant
    id: sensor_current_rate
    entity_id: sensor.octopus_energy_electricity_${octopus_serial}_${octopus_mpan}_current_rate
    internal: true
    on_value:
      then:
        - lambda: |-
            id(current_rate_value) = x * 100.0f;
        - lvgl.label.update:
            id: lbl_now_rate
            text:
              format: "%.2fp"
              args: ["x * 100.0f"]

  - platform: homeassistant
    id: sensor_next_rate
    entity_id: sensor.octopus_energy_electricity_${octopus_serial}_${octopus_mpan}_next_rate
    internal: true
    on_value:
      then:
        - lambda: |-
            id(next_rate_value) = x * 100.0f;
        - lvgl.label.update:
            id: lbl_next_rate
            text:
              format: "Next %.2fp"
              args: ["x * 100.0f"]

  - platform: homeassistant
    id: sensor_house_load_kw
    entity_id: sensor.octopus_energy_electricity_${octopus_serial}_${octopus_mpan}_current_demand
    internal: true
    on_value:
      then:
        - lambda: |-
            char buf[24];
            if (x < 1000.0f) {
              snprintf(buf, sizeof(buf), "%.0f W", x);
            } else if (x < 10000.0f) {
              snprintf(buf, sizeof(buf), "%.2f kW", x / 1000.0f);
            } else {
              snprintf(buf, sizeof(buf), "%.1f kW", x / 1000.0f);
            }
            lv_label_set_text(id(lbl_house_load), buf);

  - platform: homeassistant
    id: sensor_today_kwh
    entity_id: sensor.octopus_energy_electricity_${octopus_serial}_${octopus_mpan}_current_accumulative_consumption
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_today_kwh
            text:
              format: "%.1f kWh"
              args: ["x"]

  - platform: homeassistant
    id: sensor_today_cost
    entity_id: sensor.octopus_energy_electricity_${octopus_serial}_${octopus_mpan}_current_accumulative_cost
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_today_cost
            text:
              format: "£%.2f"
              args: ["x"]

  - platform: homeassistant
    id: sensor_today_avg_rate
    entity_id: sensor.agile_today_average_rate
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_today_avg
            text:
              format: "%.1fp"
              args: ["x"]

text_sensor:
  - platform: homeassistant
    id: sun_state
    entity_id: sun.sun
    internal: true

  - platform: homeassistant
    id: sensor_slot_text
    entity_id: sensor.agile_current_slot_text
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_slot
            text: !lambda "return x;"

  - platform: homeassistant
    id: sensor_today_high_plot_text
    entity_id: sensor.agile_today_high_text
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_today_high_plot
            text: !lambda "return x;"

  - platform: homeassistant
    id: sensor_today_prices_csv
    entity_id: sensor.agile_display_payload
    attribute: today_prices_csv
    internal: true
    on_value:
      then:
        - script.execute: schedule_chart_redraw

  - platform: homeassistant
    id: sensor_current_slot_index_text
    entity_id: sensor.agile_display_payload
    attribute: current_slot_index
    internal: true
    on_value:
      then:
        - script.execute: schedule_chart_redraw

  - platform: homeassistant
    id: sensor_best_remaining_text
    entity_id: sensor.agile_display_payload
    attribute: best_remaining_text
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_best_remaining
            text: !lambda "return x;"

  - platform: homeassistant
    id: sensor_tomorrow_prices_csv
    entity_id: sensor.agile_display_payload
    attribute: tomorrow_prices_csv
    internal: true
    on_value:
      then:
        - script.execute: schedule_tomorrow_chart_redraw

  - platform: homeassistant
    id: sensor_tomorrow_ready
    entity_id: sensor.agile_display_payload
    attribute: tomorrow_ready
    internal: true

  - platform: homeassistant
    id: sensor_tomorrow_low_value
    entity_id: sensor.agile_tomorrow_lowest
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tomorrow_low_value
            text:
              format: "%.2fp"
              args: ["atof(x.c_str())"]

  - platform: homeassistant
    id: sensor_tomorrow_high_value
    entity_id: sensor.agile_tomorrow_highest
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tomorrow_high_value
            text:
              format: "%.2fp"
              args: ["atof(x.c_str())"]

  - platform: homeassistant
    id: sensor_tomorrow_avg_value
    entity_id: sensor.agile_tomorrow_average
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tomorrow_avg_value
            text:
              format: "%.2fp"
              args: ["atof(x.c_str())"]

  - platform: homeassistant
    id: sensor_tomorrow_best_2h_text
    entity_id: sensor.agile_tomorrow_best_2h_text
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tomorrow_best_2h_value
            text: !lambda "return x;"

  - platform: homeassistant
    id: sensor_tomorrow_peak_window_text
    entity_id: sensor.agile_tomorrow_peak_window_text
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_tomorrow_peak_window_value
            text: !lambda "return x;"

binary_sensor:
  - platform: status
    name: "${friendly_name} Status"

  - platform: homeassistant
    id: bs_night_mode
    entity_id: binary_sensor.agile_display_night_mode
    internal: true
    on_state:
      then:
        - script.execute: restore_auto_brightness

# ... scripts and lvgl sections are unchanged from Tewkesbury version
# (paste your existing script: and lvgl: blocks here as-is)