# =============================================================
# Agile Energy Display – Home Assistant Templates
# Replace SERIAL and MPAN with your meter's values.
# These entity IDs must match what is configured in the
# ESPHome substitutions (octopus_serial / octopus_mpan).
# =============================================================

- sensor:
    - name: "Agile Tomorrow Lowest"
      unique_id: agile_tomorrow_lowest
      unit_of_measurement: "p/kWh"
      icon: mdi:arrow-down-bold-circle-outline
      availability: >
        {{ state_attr('event.octopus_energy_electricity_SERIAL_MPAN_next_day_rates', 'min_rate') is not none }}
      state: >
        {% set v = state_attr('event.octopus_energy_electricity_SERIAL_MPAN_next_day_rates', 'min_rate') %}
        {{ (v * 100) | round(2) }}
      attributes:
        slot: >
          {% set rates = state_attr('event.octopus_energy_electricity_SERIAL_MPAN_next_day_rates', 'rates') or [] %}
          {% if rates|length == 0 %}
            {{ none }}
          {% else %}
            {% set minv = state_attr('event.octopus_energy_electricity_SERIAL_MPAN_next_day_rates', 'min_rate') %}
            {% set matches = rates | selectattr('value_inc_vat', 'equalto', minv) | list %}
            {% set r = matches[0] if matches|length > 0 else (rates | min(attribute='value_inc_vat')) %}
            {% set s = as_local(as_datetime(r.start)) %}
            {% set e = as_local(as_datetime(r.end)) %}
            {{ s.strftime('%H:%M') }}–{{ e.strftime('%H:%M') }}
          {% endif %}

- sensor:
    - name: "Agile Tomorrow Highest"
      unique_id: agile_tomorrow_highest
      unit_of_measurement: "p/kWh"
      icon: mdi:arrow-up-bold-circle-outline
      availability: >
        {{ state_attr('event.octopus_energy_electricity_SERIAL_MPAN_next_day_rates', 'max_rate') is not none }}
      state: >
        {% set v = state_attr('event.octopus_energy_electricity_SERIAL_MPAN_next_day_rates', 'max_rate') %}
        {{ (v * 100) | round(2) }}
      attributes:
        slot: >
          {% set rates = state_attr('event.octopus_energy_electricity_SERIAL_MPAN_next_day_rates', 'rates') or [] %}
          {% if rates|length == 0 %}
            {{ none }}
          {% else %}
            {% set maxv = state_attr('event.octopus_energy_electricity_SERIAL_MPAN_next_day_rates', 'max_rate') %}
            {% set matches = rates | selectattr('value_inc_vat', 'equalto', maxv) | list %}
            {% set r = matches[0] if matches|length > 0 else (rates | max(attribute='value_inc_vat')) %}
            {% set s = as_local(as_datetime(r.start)) %}
            {% set e = as_local(as_datetime(r.end)) %}
            {{ s.strftime('%H:%M') }}–{{ e.strftime('%H:%M') }}
